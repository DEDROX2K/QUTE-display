<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CRT Desk Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single:wght@100..900&family=Martian+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
</head>
<body>
  <div class="screen">
    <div class="views-viewport">
      <div class="views-track">
        <section class="view checklist-view" aria-label="Checklist section">
          <header class="task-header">
            <span class="task-header-title">NEXT TASK:</span>
            <div class="header-clock" aria-label="Clock indicator">
              <div class="header-clock-dial" aria-hidden="true">
                <div class="header-clock-hand" id="secondsHand"></div>
              </div>
            </div>
          </header>

          <div class="center-divider" aria-hidden="true"></div>

          <main id="tasks" class="tasks-panel" aria-label="Task checklist"></main>

          <div class="notes-dock" aria-label="Quick notes">
            <button class="note-tab note-tab-1" type="button" data-note="note-1" aria-controls="bookView" aria-expanded="false">NOTE 1</button>
            <button class="note-tab note-tab-2" type="button" data-note="note-2" aria-controls="bookView" aria-expanded="false">NOTE 2</button>
            <button class="note-tab note-tab-3" type="button" data-note="note-3" aria-controls="bookView" aria-expanded="false">NOTE 3</button>
          </div>

          <div class="status-topbar" aria-label="System clock">
            <div class="status-time" id="statusTime">12:00:00 AM</div>
          </div>

          <aside class="status-panel" aria-label="Availability status">
            <div class="model-orbit" aria-label="3D profile model">
              <model-viewer
                class="avatar-viewer"
                src="./threeD/coin.glb"
                alt="3D model"
                auto-rotate
                rotation-per-second="10deg"
                camera-controls
                disable-pan
                disable-zoom
                interaction-prompt="none"
                shadow-intensity="0"
                shadow-softness="0"
                exposure="0"
                lighting-intensity="0"
                environment-image="neutral"
                camera-orbit="30deg 78deg auto"
                field-of-view="28deg">
              </model-viewer>
            </div>
            <button id="statusButton" class="status-button" type="button">AVAILABLE</button>
            <div class="diagnostics" id="diagnostics">AVAILABLE CPU 43%</div>
            <div class="stripes" aria-hidden="true">
              <div class="stripes-track">
                <span class="stripe stripe-1"></span>
                <span class="stripe stripe-2"></span>
                <span class="stripe stripe-3"></span>
                <span class="stripe stripe-4"></span>
                <span class="stripe stripe-5"></span>
                <span class="stripe stripe-6"></span>
                <span class="stripe stripe-7"></span>
                <span class="stripe stripe-8"></span>
                <span class="stripe stripe-9"></span>
              </div>
              <div class="stripes-track" aria-hidden="true">
                <span class="stripe stripe-1"></span>
                <span class="stripe stripe-2"></span>
                <span class="stripe stripe-3"></span>
                <span class="stripe stripe-4"></span>
                <span class="stripe stripe-5"></span>
                <span class="stripe stripe-6"></span>
                <span class="stripe stripe-7"></span>
                <span class="stripe stripe-8"></span>
                <span class="stripe stripe-9"></span>
              </div>
            </div>
          </aside>

          <div class="printer-note" id="printerNote">WELLNESS BULLETIN READY FOR COLLECTION</div>
        </section>

        <section id="bookView" class="view book-view" aria-label="Book section" aria-hidden="true">
          <button id="checklistReturn" class="checklist-tab" type="button" aria-label="Return to checklist">
            <span class="checklist-tab-label">CHECKLIST</span>
            <span class="checklist-tab-arrow" aria-hidden="true">«</span>
          </button>

          <div class="book-shell">
            <article class="book-page book-page-single">
              <div class="book-page-inner single">
                <h2
                  class="book-title book-editable"
                  id="noteTitle"
                  contenteditable="true"
                  spellcheck="false"
                  role="textbox"
                  aria-label="Note title"
                  data-placeholder="Title"></h2>
                <div
                  class="book-subtitle book-editable"
                  id="noteSubtitle"
                  contenteditable="true"
                  spellcheck="false"
                  role="textbox"
                  aria-label="Note subtitle"
                  data-placeholder="Subtitle"></div>
                <div
                  class="book-copy book-editable"
                  id="noteBody"
                  contenteditable="true"
                  spellcheck="false"
                  role="textbox"
                  aria-label="Note content"
                  data-placeholder="Start writing..."></div>
              </div>
            </article>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
