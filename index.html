<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CRT Desk Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500;600;700&family=DotGothic16&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stage" id="stage" data-view="crt">
    <section class="notepad-screen" aria-label="Notepad workspace">
      <button id="closeNotepad" class="notepad-launcher notepad-launcher--back" type="button" aria-label="Return to display">DISPLAY</button>
      <div class="notepad-shell">
        <div class="notepad-header">
          <div class="notepad-title">Workspace Notes</div>
        </div>
        <div class="notepad-splitview">
          <section class="note-pane note-pane--light" aria-label="Left notes pane">
            <div class="notepad-tablist" id="leftTablist" role="tablist" aria-label="Left notes tabs"></div>
            <div class="notepad-editor">
              <input id="leftNoteTitleInput" class="note-title-input" type="text" maxlength="60" placeholder="Untitled note" aria-label="Left note title" />
              <textarea id="leftNoteBodyInput" class="note-body-input" placeholder="Start typing..." aria-label="Left note body"></textarea>
            </div>
          </section>
          <section class="note-pane note-pane--dark" aria-label="Right notes pane">
            <div class="notepad-tablist notepad-tablist--dark" id="rightTablist" role="tablist" aria-label="Right notes tabs"></div>
            <div class="notepad-editor notepad-editor--dark">
              <input id="rightNoteTitleInput" class="note-title-input note-title-input--dark" type="text" maxlength="60" placeholder="Untitled note" aria-label="Right note title" />
              <textarea id="rightNoteBodyInput" class="note-body-input note-body-input--dark" placeholder="Start typing..." aria-label="Right note body"></textarea>
            </div>
          </section>
        </div>
      </div>
    </section>

    <div class="screen">
      <button id="openNotepad" class="notepad-launcher" type="button" aria-label="Open notepad">NOTEPAD</button>
      <header class="task-header">NEXT TASK:</header>

      <section class="clock-panel" aria-label="Current time">
        <div class="seconds-dial" aria-hidden="true">
          <div class="seconds-hand" id="secondsHand"></div>
          <div class="seconds-center"></div>
        </div>
        <time id="clock">00:00</time>
        <div class="rail-meta" aria-hidden="true">
          <span class="rail-badge">MDR</span>
          <span>04</span>
        </div>
      </section>

      <main id="tasks" class="tasks-panel" aria-label="Task checklist"></main>

      <aside class="status-panel" aria-label="Availability status">
        <button id="statusButton" class="status-button" type="button">AVAILABLE</button>
        <div class="diagnostics" id="diagnostics">AVAILABLE CPU 43%</div>
        <div class="stripes" aria-hidden="true">
          <span class="stripe"></span>
          <span class="stripe"></span>
          <span class="stripe"></span>
          <span class="stripe"></span>
          <span class="stripe"></span>
          <span class="stripe"></span>
          <span class="stripe"></span>
          <span class="stripe"></span>
          <span class="stripe"></span>
        </div>
      </aside>

      <div class="printer-note" id="printerNote">WELLNESS BULLETIN READY FOR COLLECTION</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
